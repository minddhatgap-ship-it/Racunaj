name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── Fix dependencies for Expo SDK 53 + React Native 0.79 ───────────
      # React Native 0.79 requires New Architecture-compatible package versions
      # SDK 53 is the current Expo SDK for RN 0.79.x
      - name: Fix package.json dependencies for SDK 53 + RN 0.79
        run: |
          # react-native-screens: 4.23.0+ required for RN 0.79 New Architecture (Fabric)
          # 4.18.2 causes Codegen "Unknown prop type" errors
          npm pkg set dependencies.react-native-screens="~4.23.0"
          # react-native-gesture-handler: 2.24.0+ compatible with RN 0.79
          npm pkg set dependencies.react-native-gesture-handler="~2.24.0"
          # react-native-reanimated: 3.17.4 is correct for SDK 53
          npm pkg set dependencies.react-native-reanimated="~3.17.5"
          # expo-web-browser: SDK 53 version
          npm pkg set dependencies.expo-web-browser="~14.1.6"
          # expo-splash-screen: SDK 53 version
          npm pkg set dependencies.expo-splash-screen="~0.30.8"
          # expo-status-bar: SDK 53 version  
          npm pkg set dependencies.expo-status-bar="~2.2.3"
          # expo-file-system: SDK 53 version
          npm pkg set dependencies.expo-file-system="~18.1.10"
          # expo-sharing: SDK 53 version
          npm pkg set dependencies.expo-sharing="~13.1.5"
          echo "📦 Fixed dependencies for Expo SDK 53 + React Native 0.79.3"
          node -e "const p=require('./package.json'); console.log('react-native-screens:', p.dependencies['react-native-screens'])"
      # ─── Install ──────────────────────────────────────────────────────────
      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Verify expo CLI
        run: |
          node_modules/.bin/expo --version
          echo "✅ expo CLI ready"
      # ─── Generate native Android project ─────────────────────────────────
      - name: Clean previous builds
        run: |
          rm -rf android/
          rm -rf .expo/
          
      - name: Expo Prebuild (Android)
        run: node_modules/.bin/expo prebuild --platform android --clean --no-install

      # ─── Build APK ────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── Artifacts ───────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-report
          path: |
            android/build/reports/
            android/app/build/reports/
