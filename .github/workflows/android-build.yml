name: EAS Build (Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options: [android, ios, all]
      profile:
        description: 'Profile'
        required: true
        default: 'production'
        type: choice
        options: [development, preview, production]

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install react-native-bluetooth-escpos-printer --legacy-peer-deps

      # ─── Trigger Build ──────────────────────────────────────────────────
      # We removed "eas init" because the ID is already in your app.json
      
      - name: Build Android
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' || github.event_name == 'push'
        run: |
          eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        run: |
          eas build --platform ios --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
