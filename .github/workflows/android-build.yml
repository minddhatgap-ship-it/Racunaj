name: EAS Build (Cloud)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ─── Fix Dependencies (Essential for SDK 55 / React 19) ──────────────
      - name: Fix package.json dependencies
        run: |
          npm pkg set dependencies.expo-web-browser="~55.0.0"
          npm pkg set dependencies.react-native-screens="~4.23.0"
          npm pkg set dependencies.expo-splash-screen="~55.0.0"
          npm pkg set dependencies.expo-status-bar="~55.0.0"
          npm pkg set dependencies.expo-file-system="~55.0.0"
          npm pkg set dependencies.expo-sharing="~55.0.0"
          npm pkg set dependencies.react-native-gesture-handler="~2.30.0"
          npm pkg set dependencies.react-native-mmkv="^3.2.0"
          npm pkg delete dependencies.@react-native-async-storage/async-storage 2>/dev/null || true

      # ─── Install ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ─── Configure EAS (Prevents "Project Not Configured" error) ──────────
      # Replace 'YOUR_PROJECT_ID_HERE' with your ID from expo.dev project settings
      - name: Initialize EAS Project
        run: npx eas-cli init --id ${{ secrets.EAS_PROJECT_ID }} --non-interactive
        if: env.EXPO_TOKEN != ''
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── EAS Cloud Build ──────────────────────────────────────────────────
      - name: Build Android with EAS
        if: github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' || github.event_name == 'push'
        run: |
          eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait

      - name: Build iOS with EAS
        if: github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all'
        run: |
          eas build --platform ios --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive --no-wait
